<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="utf-8">
    <title>Katniss Everdeen</title>

    <link href="https://fonts.googleapis.com/css2?family=Roboto&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: Verdana, sans-serif;
            background-color: orange;
            margin: 0;
            text-align: center;
        }

        /* Button oben links */
        button {
            position: absolute;
            top: 10px;
            left: 10px;
            padding: 10px;
            cursor: pointer;
        }

        /* Bilder mittig */
        .top-image {
            display: block;
            margin: 20px auto;
        }

        .content {
            padding: 50px 20px;
        }
    </style>
</head>

<body>

<button onclick="document.body.style.backgroundColor='green'">
    Farbe ändern
</button>

<!-- NEUES Bild oben mittig -->
<img class="top-image"
     src="https://upload.wikimedia.org/wikipedia/en/3/3c/Katniss_Everdeen.jpg"
     alt="Katniss Everdeen Portrait"
     width="200">

<div class="content">
    <h1>Wer ist Katniss Everdeen (Hunger Games)?</h1>

    <p>
        - 16 Jahre alt<br>
        - Aus Distrikt 12 (Panem)<br>
        - Gewinnerin der 74. jährlichen Hunger Games (zusammen mit Peeta Mellark)
    </p>

    <!-- DEIN ALTES Bild bleibt -->
    <img src="https://live.staticflickr.com/722/21790752300_695f99254b_b.jpg"
         alt="Katniss Everdeen während der 74. Hunger Spiele"
         width="300">
</div>

</body>
</html>
